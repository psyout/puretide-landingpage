name: CI

on:
     push:
          branches: [main]
     pull_request:
          branches: [main]

jobs:
     ci:
          runs-on: ubuntu-latest
          env:
               FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          strategy:
               fail-fast: false
               matrix:
                    node-version: [20.x, 22.x]
          steps:
               - uses: actions/checkout@v4

               - name: Setup Node.js
                 uses: actions/setup-node@v4
                 with:
                      node-version: ${{ matrix.node-version }}
                      cache: npm

               - name: Install dependencies
                 run: npm install --no-audit --no-fund

               - name: Lint
                 run: npm run lint

               - name: Test
                 run: npm test
                 env:
                      NODE_ENV: test

               - name: Build
                 run: npm run build
                 env:
                      NEXT_TELEMETRY_DISABLED: 1
                      DASHBOARD_SECRET: ci-placeholder-dashboard-secret
                      ORDER_CONFIRMATION_SECRET: ci-placeholder-order-confirmation-secret
